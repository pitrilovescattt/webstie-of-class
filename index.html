<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WebClass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="https://i.imgur.com/3ZQ3Z6K.png" width="150">
    <div class="card">
    <h2>Kelas Favorit</h2>
    <p>Belajar seru setiap hari!</p>
</div>

<header>
    <h1>📚 WebClass Fitri 📚</h1>
    <p>Belajar Online Bersama Fitri</p>
</header>

<nav>
    <button onclick="showSection('materi')">Materi</button>
    <button onclick="showSection('tugas')">Tugas</button>
</nav>

<main>
    <section id="Materi">
        <h2>Materi</h2>
        <ul>
            <li>HTML Dasar</li>
            <li>CSS Dasar</li>
            <li>JavaScript Dasar</li>
        </ul>
    </section>

    <section id="Tugas" style="display:none;">
        <h2>Tugas</h2>
        <p>Kumpulkan tugas kamu di bawah:</p>
        <input type="text" id="taskInput" placeholder="Masukkan tugas">
        <button onclick="addTask()">Tambah</button>

        <ul id="taskList"></ul>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
